<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/timing-editor.css') }}">
</head>
<body>
    <div class="timing-editor-container">
        <h4 style="margin-bottom: 16px;">
            <i class="fas fa-clock me-2"></i>Timing Editor
            <a href="/" class="btn btn-sm btn-outline-secondary ms-3">
                <i class="fas fa-arrow-left me-1"></i>Back
            </a>
        </h4>

        <div class="timing-top-bar">
            <label style="font-size: 0.85rem;">Bot:</label>
            <select id="botSelector"></select>
            <label style="font-size: 0.85rem;">Preset:</label>
            <select id="presetSelector"></select>
            <button class="btn btn-sm btn-outline-info" onclick="applyPreset()">Apply</button>
            <button class="btn btn-sm btn-outline-success" onclick="saveAsCustomPreset()">Save as Custom</button>
            <button class="btn btn-sm btn-outline-warning" onclick="clearAllOverrides()">Clear Overrides</button>
        </div>

        <div id="categoriesContainer"></div>
    </div>

<script src="{{ url_for('static', filename='js/timing-editor.js') }}"></script>
</body>
</html>
